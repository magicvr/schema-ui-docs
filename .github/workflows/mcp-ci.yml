name: MCP CI

on:
  pull_request:
    paths:
      - 'mcp/**'
      - 'validator/**'
      - 'scripts/**'
      - 'protocol-manifest.json'
      - 'docs/**'
      - '!docs/audit/**'
      - 'conformance/fixtures/**'
      - 'conformance/schemas/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-ci.yml'
  push:
    branches: [main, master]
    paths:
      - 'mcp/**'
      - 'validator/**'
      - 'scripts/**'
      - 'protocol-manifest.json'
      - 'docs/**'
      - '!docs/audit/**'
      - 'conformance/fixtures/**'
      - 'conformance/schemas/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mcp:
    name: Build, test, and smoke MCP (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.19.0', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install protocol build dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix mcp

      - name: Audit MCP dependencies
        run: npm audit --prefix mcp --audit-level=high

      - name: Verify MCP/protocol compatibility declaration
        run: npm run release:check:mcp

      - name: Build MCP
        run: npm --prefix mcp run build

      - name: Test MCP
        run: npm --prefix mcp test

      - name: Smoke test MCP tools
        run: npm --prefix mcp run smoke:tools

      - name: Build and smoke Docker image
        if: matrix.node-version == '24'
        shell: bash
        run: |
          VERSION=$(node -p "require('./mcp/package.json').version")
          PROTOCOL_VERSION=$(node -p "require('./mcp/package.json').schemaUiProtocol.artifactVersion")
          VALIDATOR_VERSION=$(node -p "require('./mcp/package.json').schemaUiValidator.version")
          docker build -f mcp/Dockerfile \
            --build-arg MCP_VERSION=${VERSION} \
            --build-arg PROTOCOL_ARTIFACT_VERSION=${PROTOCOL_VERSION} \
            --build-arg VALIDATOR_VERSION=${VALIDATOR_VERSION} \
            -t schema-ui-mcp:${VERSION} .
          npm --prefix mcp run smoke:docker -- schema-ui-mcp:${VERSION}
