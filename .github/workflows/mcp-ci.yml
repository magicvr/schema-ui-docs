name: MCP CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protocol:
    name: Validate official scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install protocol dependencies
        run: npm ci

      - name: Validate official scenarios
        run: npm run validate:scenarios

      - name: Validate versioned fixture suites
        run: npm run validate:conformance

      - name: Test version negotiation conformance
        run: npm run test:conformance:version

      - name: Test query serialization conformance
        run: npm run test:conformance:query

      - name: Test Python query serialization conformance
        run: npm run test:conformance:query:python

      - name: Test reaction scheduling conformance
        run: npm run test:conformance:reactions

      - name: Test Python reaction scheduling conformance
        run: npm run test:conformance:reactions:python

      - name: Test table query state conformance
        run: npm run test:conformance:table-state

      - name: Test request construction conformance
        run: npm run test:conformance:request

      - name: Test Python request construction conformance
        run: npm run test:conformance:request:python

      - name: Test response mapping conformance
        run: npm run test:conformance:response

      - name: Test Python response mapping conformance
        run: npm run test:conformance:response:python

      - name: Test search table conformance
        run: npm run test:conformance:search-table

      - name: Test Python search table conformance
        run: npm run test:conformance:search-table:python

  mcp:
    name: Build, test, and smoke MCP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install protocol dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix mcp

      - name: Verify package versions
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const rootLock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const mcp = JSON.parse(fs.readFileSync('mcp/package.json', 'utf8'));
          const mcpLock = JSON.parse(fs.readFileSync('mcp/package-lock.json', 'utf8'));
          const versions = [
            root.version,
            rootLock.version,
            rootLock.packages[''].version,
            mcp.version,
            mcpLock.version,
            mcpLock.packages[''].version,
            mcpLock.packages['..'].version,
          ];
          if (versions.some(version => version !== root.version)) {
            throw new Error(`Package version mismatch: ${versions.join(', ')}`);
          }
          NODE

      - name: Build MCP
        run: npm --prefix mcp run build

      - name: Test MCP
        run: npm --prefix mcp test

      - name: Smoke test MCP tools
        run: npm --prefix mcp run smoke:tools

      - name: Read MCP version
        id: mcp-version
        shell: bash
        run: |
          VERSION=$(node -p "require('./mcp/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build MCP Docker image
        run: docker build -f mcp/Dockerfile -t schema-ui-mcp:${{ steps.mcp-version.outputs.version }} .

      - name: Smoke test MCP Docker image
        run: npm --prefix mcp run smoke:docker -- schema-ui-mcp:${{ steps.mcp-version.outputs.version }}
