name: MCP CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push MCP Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      IMAGE_NAME: schema-ui-mcp
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/schema-ui-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install protocol dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix mcp

      - name: Check release metadata and Git tag
        id: release-check
        run: npm run release:check:tag

      - name: Validate official scenarios
        run: npm run validate:scenarios

      - name: Validate versioned fixture suites
        run: npm run validate:conformance

      - name: Test version negotiation conformance
        run: npm run test:conformance:version

      - name: Test Python version negotiation conformance
        run: npm run test:conformance:version:python

      - name: Test query serialization conformance
        run: npm run test:conformance:query

      - name: Test Python query serialization conformance
        run: npm run test:conformance:query:python

      - name: Test Action outcome conformance
        run: npm run test:conformance:actions

      - name: Test Python Action outcome conformance
        run: npm run test:conformance:actions:python

      - name: Test reaction scheduling conformance
        run: npm run test:conformance:reactions

      - name: Test Python reaction scheduling conformance
        run: npm run test:conformance:reactions:python

      - name: Test table query state conformance
        run: npm run test:conformance:table-state

      - name: Test request construction conformance
        run: npm run test:conformance:request

      - name: Test Python request construction conformance
        run: npm run test:conformance:request:python

      - name: Test response mapping conformance
        run: npm run test:conformance:response

      - name: Test Python response mapping conformance
        run: npm run test:conformance:response:python

      - name: Test search table conformance
        run: npm run test:conformance:search-table

      - name: Test Python search table conformance
        run: npm run test:conformance:search-table:python

      - name: Test official scenario execution conformance
        run: npm run test:conformance:scenarios

      - name: Test Python official scenario execution conformance
        run: npm run test:conformance:scenarios:python

      - name: Test upload conformance
        run: npm run test:conformance:uploads

      - name: Test Python upload conformance
        run: npm run test:conformance:uploads:python

      - name: Compute Docker image tags
        id: mcp-version
        env:
          RELEASE_VERSION: ${{ steps.release-check.outputs.version }}
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;
          const match = /^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(version);
          if (!match) throw new Error(`Unsupported release version: ${version}`);

          const repository = process.env.DOCKERHUB_REPOSITORY;
          const tags = [
            `${repository}:${version}`,
            `${repository}:${process.env.GITHUB_SHA}`,
          ];
          if (!match[4]) {
            tags.push(`${repository}:${match[1]}.${match[2]}`, `${repository}:latest`);
          }

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `version=${version}\n`);
          fs.appendFileSync(output, `tags<<EOF\n${tags.join('\n')}\nEOF\n`);
          NODE

      - name: Build MCP
        run: npm --prefix mcp run build

      - name: Test MCP
        run: npm --prefix mcp test

      - name: Smoke test MCP tools
        run: npm --prefix mcp run smoke:tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.mcp-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test MCP Docker image
        run: npm --prefix mcp run smoke:docker -- ${{ env.IMAGE_NAME }}:${{ steps.mcp-version.outputs.version }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        id: push-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/Dockerfile
          push: true
          tags: ${{ steps.mcp-version.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and smoke remote immutable tags
        env:
          RELEASE_VERSION: ${{ steps.release-check.outputs.version }}
          FIXTURE_DIGEST: ${{ steps.release-check.outputs.fixture-digest }}
          IMAGE_DIGEST: ${{ steps.push-image.outputs.digest }}
        shell: bash
        run: |
          VERSION_IMAGE="${DOCKERHUB_REPOSITORY}:${RELEASE_VERSION}"
          SHA_IMAGE="${DOCKERHUB_REPOSITORY}:${GITHUB_SHA}"
          docker pull "${VERSION_IMAGE}"
          npm --prefix mcp run smoke:docker -- "${VERSION_IMAGE}"
          docker pull "${SHA_IMAGE}"
          npm --prefix mcp run smoke:docker -- "${SHA_IMAGE}"

          VERSION_DIGEST=$(docker image inspect "${VERSION_IMAGE}" --format '{{index .RepoDigests 0}}')
          SHA_DIGEST=$(docker image inspect "${SHA_IMAGE}" --format '{{index .RepoDigests 0}}')
          if [ "${VERSION_DIGEST}" != "${SHA_DIGEST}" ]; then
            echo "Remote version and SHA tags resolve to different digests."
            exit 1
          fi
          REMOTE_DIGEST="${VERSION_DIGEST#*@}"
          if [ "${REMOTE_DIGEST}" != "${IMAGE_DIGEST}" ]; then
            echo "Remote tags do not resolve to the pushed build digest."
            exit 1
          fi

          {
            echo "## Release evidence"
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Fixture digest: \`${FIXTURE_DIGEST}\`"
            echo "- Build digest: \`${IMAGE_DIGEST}\`"
            echo "- Remote image digest: \`${VERSION_DIGEST}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prune old SHA tags (keep latest 10)
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKERHUB_REPOSITORY_NAME: schema-ui-mcp
        shell: bash
        run: |
          LOGIN_RESPONSE=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKER_USERNAME}\", \"password\": \"${DOCKER_TOKEN}\"}")
          TOKEN=$(echo "$LOGIN_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))")
          if [ -z "$TOKEN" ]; then
            echo "DockerHub login failed: $LOGIN_RESPONSE"
            exit 1
          fi

          PAGE=1
          SHA_TAGS=()
          while true; do
            RESPONSE=$(curl -s -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${DOCKERHUB_REPOSITORY_NAME}/tags/?page=${PAGE}&page_size=100")
            COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('results', [])))")
            if [ "$COUNT" -eq "0" ]; then break; fi

            TAGS=$(echo "$RESPONSE" | python3 -c "
          import re, sys, json
          d = json.load(sys.stdin)
          sha_re = re.compile(r'^[0-9a-f]{40}$')
          for r in d.get('results', []):
              name = r['name']
              updated = r.get('tag_last_pushed') or r.get('last_updated') or '1970-01-01T00:00:00Z'
              if sha_re.match(name):
                  print(updated + ' ' + name)
          ")
            while IFS= read -r line; do
              [ -n "$line" ] && SHA_TAGS+=("$line")
            done <<< "$TAGS"

            NEXT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('next') or '')")
            [ -z "$NEXT" ] && break
            PAGE=$((PAGE + 1))
          done

          SORTED=$(printf '%s\n' "${SHA_TAGS[@]}" | sort -r)
          TO_DELETE=$(printf '%s\n' "$SORTED" | tail -n +11 | awk '{print $2}')

          if [ -z "$TO_DELETE" ]; then
            echo "No SHA tags to prune."
            exit 0
          fi

          FAILED=0
          while IFS= read -r TAG; do
            echo "Deleting tag: ${TAG}"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${DOCKERHUB_REPOSITORY_NAME}/tags/${TAG}/")
            if [ "$HTTP_STATUS" != "204" ]; then
              echo "Failed to delete tag ${TAG} (HTTP ${HTTP_STATUS})"
              FAILED=1
            fi
          done <<< "$TO_DELETE"
          exit $FAILED
