name: MCP Release

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:

# Protocol tags (v*) never trigger this workflow.
# MCP images publish to GitHub Container Registry (ghcr.io), not Docker Hub.

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push MCP image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Local smoke image name (not pushed).
      LOCAL_IMAGE_NAME: schema-ui-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install protocol build dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix mcp

      - name: Audit protocol build dependencies (high+)
        run: npm audit --audit-level=high

      - name: Audit MCP dependencies (high+)
        run: npm audit --prefix mcp --audit-level=high

      - name: Check MCP release metadata and Git tag
        id: release-check
        run: npm run release:check:mcp:tag

      - name: Compute image repository and tags
        id: mcp-version
        env:
          RELEASE_VERSION: ${{ steps.release-check.outputs.mcp-version }}
          OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;
          const match = /^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(version);
          if (!match) throw new Error(`Unsupported release version: ${version}`);

          // GHCR package names must be lowercase.
          const owner = String(process.env.OWNER || '').toLowerCase();
          if (!owner) throw new Error('Missing repository owner');
          const repository = `ghcr.io/${owner}/schema-ui-mcp`;

          const tags = [
            `${repository}:${version}`,
            `${repository}:${process.env.GITHUB_SHA}`,
          ];
          // Stable releases (no pre-release suffix) also update minor alias and latest.
          if (!match[4]) {
            tags.push(`${repository}:${match[1]}.${match[2]}`, `${repository}:latest`);
          }

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `version=${version}\n`);
          fs.appendFileSync(output, `repository=${repository}\n`);
          fs.appendFileSync(output, `tags<<EOF\n${tags.join('\n')}\nEOF\n`);
          NODE

      - name: Build MCP
        run: npm --prefix mcp run build

      - name: Test MCP
        run: npm --prefix mcp test

      - name: Smoke test MCP tools
        run: npm --prefix mcp run smoke:tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE_NAME }}:${{ steps.mcp-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            MCP_VERSION=${{ steps.mcp-version.outputs.version }}
            PROTOCOL_ARTIFACT_VERSION=${{ steps.release-check.outputs.protocol-version }}
            VALIDATOR_VERSION=${{ steps.release-check.outputs.validator-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test MCP Docker image
        run: npm --prefix mcp run smoke:docker -- ${{ env.LOCAL_IMAGE_NAME }}:${{ steps.mcp-version.outputs.version }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        id: push-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/Dockerfile
          push: true
          tags: ${{ steps.mcp-version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Schema-UI MCP stdio server (protocol reader and validator)
          build-args: |
            MCP_VERSION=${{ steps.mcp-version.outputs.version }}
            PROTOCOL_ARTIFACT_VERSION=${{ steps.release-check.outputs.protocol-version }}
            VALIDATOR_VERSION=${{ steps.release-check.outputs.validator-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and smoke remote immutable tags
        env:
          RELEASE_VERSION: ${{ steps.release-check.outputs.mcp-version }}
          PROTOCOL_CONTENT_DIGEST: ${{ steps.release-check.outputs.protocol-content-digest }}
          IMAGE_DIGEST: ${{ steps.push-image.outputs.digest }}
          GHCR_REPOSITORY: ${{ steps.mcp-version.outputs.repository }}
        shell: bash
        run: |
          VERSION_IMAGE="${GHCR_REPOSITORY}:${RELEASE_VERSION}"
          SHA_IMAGE="${GHCR_REPOSITORY}:${GITHUB_SHA}"
          docker pull "${VERSION_IMAGE}"
          npm --prefix mcp run smoke:docker -- "${VERSION_IMAGE}"
          docker pull "${SHA_IMAGE}"
          npm --prefix mcp run smoke:docker -- "${SHA_IMAGE}"

          VERSION_DIGEST=$(docker image inspect "${VERSION_IMAGE}" --format '{{index .RepoDigests 0}}')
          SHA_DIGEST=$(docker image inspect "${SHA_IMAGE}" --format '{{index .RepoDigests 0}}')
          if [ "${VERSION_DIGEST}" != "${SHA_DIGEST}" ]; then
            echo "Remote version and SHA tags resolve to different digests."
            exit 1
          fi
          REMOTE_DIGEST="${VERSION_DIGEST#*@}"
          if [ "${REMOTE_DIGEST}" != "${IMAGE_DIGEST}" ]; then
            echo "Remote tags do not resolve to the pushed build digest."
            exit 1
          fi

          {
            echo "## MCP Release evidence (GHCR)"
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image repository: \`${GHCR_REPOSITORY}\`"
            echo "- Bundled protocol content digest: \`${PROTOCOL_CONTENT_DIGEST}\`"
            echo "- Build digest: \`${IMAGE_DIGEST}\`"
            echo "- Remote image digest: \`${VERSION_DIGEST}\`"
            echo "- Tags pushed: version, commit SHA; stable also minor + latest"
            echo ""
            echo "First public release: set the package visibility to **Public** under"
            echo "GitHub → Packages → schema-ui-mcp → Package settings, so anonymous pull works."
          } >> "${GITHUB_STEP_SUMMARY}"
