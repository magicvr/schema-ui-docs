# L2 负例：树上存在 type: recordView 但 protocolVersion 为 "2.3"（审计 0067 / V303）
# 期望：path meta.protocolVersion，文案含 PROTOCOL_VERSION_TOO_LOW 与 recordView
meta:
  pageId: audit_0067_recordview_on_23
  title: bad recordView on 2.3
  protocolVersion: "2.3"
  requiredCapabilities:
    - record.view.load

body:
  type: recordView
  props:
    title: 订单详情
    recordSource:
      method: GET
      url: /api/orders/{orderId}
      path:
        orderId: $context.route.query.orderId
      responseMapping:
        orderId: orderId
        status: status
    fields:
      - key: orderId
        label: 单号
      - key: status
        label: 状态
