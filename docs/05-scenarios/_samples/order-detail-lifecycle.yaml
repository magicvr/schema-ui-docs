meta:
  pageId: order_detail_lifecycle
  title: 订单详情
  protocolVersion: "2.4"
  requiredCapabilities:
    - record.view.load
    - actions.page.trigger

actions:
  backToList:
    type: navigate
    url: /orders

body:
  type: section
  props:
    title: 订单详情
  children:
    - type: actionButton
      props:
        key: back
        label: 返回列表
        actionRef: backToList
    - type: recordView
      props:
        title: 基本信息
        recordSource:
          method: GET
          url: /api/orders/{orderId}
          path:
            orderId: $context.route.query.orderId
          responseMapping:
            orderId: orderId
            customerName: customer.name
            status: status
            amount: amount
        fields:
          - key: orderId
            label: 订单号
          - key: customerName
            label: 客户
          - key: status
            label: 状态
            format: tag
            tagMap:
              paid:
                text: 已支付
                tone: success
              pending:
                text: 待支付
                tone: warning
          - key: amount
            label: 金额
            format: currency
